services:
  backend:
    build: .
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
    command: yarn run start:dev

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
